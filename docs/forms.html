<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>legacy.css - forms</title>
    <link rel="stylesheet" href="assets/legacy.css">
    <link rel="stylesheet" href="assets/docs.css">
    <script src="assets/i18n.config.js" defer></script>
    <script src="assets/i18n.js" defer></script>
  </head>
  <body data-i18n-document-title="forms.title">
    <main>
      <div class="docs-heading-row">
        <h1 data-i18n="forms.heading">Complete form</h1>
        <select id="language-select" data-language-select data-i18n-aria-label="common.language"></select>
      </div>

      <nav aria-label="Examples" data-i18n-aria-label="common.navLabel">
        <a href="index.html" data-i18n="common.nav.home">Home</a>
        <a href="forms.html" data-i18n="common.nav.forms">Forms</a>
        <a href="tables.html" data-i18n="common.nav.tables">Tables</a>
        <a href="components.html" data-i18n="common.nav.components">Components</a>
      </nav>

      <form>
        <fieldset>
          <legend data-i18n="forms.fieldset.registration">Registration data</legend>

          <label for="name" data-i18n="forms.name">Full name</label>
          <input id="name" name="name" type="text" placeholder="Maria Silva">

          <label for="email" data-i18n="forms.email">Email</label>
          <input id="email" name="email" type="email" placeholder="maria@example.com">

          <label for="department" data-i18n="forms.department">Department</label>
          <select id="department" name="department">
            <option data-i18n="forms.department.finance">Finance</option>
            <option data-i18n="forms.department.hr">Human resources</option>
            <option data-i18n="forms.department.operations">Operations</option>
          </select>
        </fieldset>

        <fieldset>
          <legend data-i18n="forms.fieldset.preferences">Preferences</legend>

          <label>
            <input name="newsletter" type="checkbox">
            <span data-i18n="forms.newsletter">Receive internal announcements</span>
          </label>

          <label>
            <input name="profile" type="radio" value="user">
            <span data-i18n="forms.profile.user">User</span>
          </label>

          <label>
            <input name="profile" type="radio" value="manager">
            <span data-i18n="forms.profile.manager">Manager</span>
          </label>

          <label for="notes" data-i18n="forms.notes">Notes</label>
          <textarea id="notes" name="notes"></textarea>
        </fieldset>

        <button type="submit" data-i18n="forms.button.save">Save</button>
        <button type="reset" data-i18n="forms.button.clear">Clear</button>
      </form>
    </main>
  </body>
</html>
